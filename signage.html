<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Signage Display</title>
<style>
  :root {
    --ticker-h: 8vh;
    --ticker-bg: #111;
    --ticker-ink: #fff;
    --ticker-accent: #ffcb05;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    cursor: none;               /* hide the pointer on kiosk TVs */
    -webkit-user-select: none;
    user-select: none;
  }

  /* ---------- Stage (media area) ---------- */
  #stage {
    position: absolute;
    top: 0; left: 0; right: 0;
    bottom: 0;                  /* filled dynamically when a ticker is present */
    background: #000;
  }
  .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 1s ease-in-out;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }
  .slide.active { opacity: 1; }
  .slide img,
  .slide video {
    width: 100%;
    height: 100%;
  }
  /* fit: contain (letterbox) vs cover (fill/crop) — set per-slide or globally */
  .fit-contain img, .fit-contain video { object-fit: contain; }
  .fit-cover img,   .fit-cover video   { object-fit: cover; }

  /* Optional caption overlay on a slide */
  .caption {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    padding: 3vh 4vw;
    background: linear-gradient(to top, rgba(0,0,0,0.75), rgba(0,0,0,0));
    color: #fff;
    font-size: 3.2vh;
    font-weight: 600;
    letter-spacing: 0.3px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
  }

  /* ---------- Ticker ---------- */
  #ticker {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: var(--ticker-h);
    background: var(--ticker-bg);
    color: var(--ticker-ink);
    display: none;              /* shown when tickerText is present */
    align-items: center;
    overflow: hidden;
    border-top: 3px solid var(--ticker-accent);
  }
  #ticker.on { display: flex; }
  #ticker .label {
    flex: 0 0 auto;
    height: 100%;
    display: flex;
    align-items: center;
    padding: 0 2.2vw;
    background: var(--ticker-accent);
    color: #111;
    font-weight: 800;
    font-size: 3.2vh;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  #ticker .track {
    flex: 1 1 auto;
    overflow: hidden;
    white-space: nowrap;
  }
  #ticker .track span {
    display: inline-block;
    padding-left: 100%;
    font-size: 3.6vh;
    font-weight: 600;
    animation: scroll-left linear infinite;
  }
  @keyframes scroll-left {
    from { transform: translateX(0); }
    to   { transform: translateX(-100%); }
  }

  /* ---------- Clock (optional corner) ---------- */
  #clock {
    position: absolute;
    top: 2.2vh; right: 2.4vw;
    color: #fff;
    font-size: 3.4vh;
    font-weight: 700;
    text-shadow: 0 2px 10px rgba(0,0,0,0.8);
    letter-spacing: 1px;
    display: none;
    z-index: 5;
  }
  #clock.on { display: block; }

  /* ---------- Weather (optional corner) ---------- */
  #weather {
    position: absolute;
    top: 2.2vh; left: 2.4vw;
    color: #fff;
    text-shadow: 0 2px 10px rgba(0,0,0,0.85);
    display: none;
    align-items: center;
    gap: 1.2vw;
    z-index: 5;
  }
  #weather.on { display: flex; }
  #weather .icon { font-size: 4.6vh; line-height: 1; }
  #weather .temp { font-size: 4vh; font-weight: 800; letter-spacing: 0.5px; }
  #weather .meta { display: flex; flex-direction: column; }
  #weather .cond { font-size: 2vh; font-weight: 600; opacity: 0.95; }
  #weather .place { font-size: 1.7vh; font-weight: 500; opacity: 0.8; }

  /* ---------- First-run / error message ---------- */
  #message {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: #ddd;
    padding: 6vw;
    z-index: 10;
  }
  #message.on { display: flex; }
  #message h1 { font-size: 4vh; margin-bottom: 2vh; color: #fff; }
  #message p  { font-size: 2.4vh; line-height: 1.5; max-width: 40ch; color: #aaa; }
  #message code {
    background: #1c1c1c;
    color: var(--ticker-accent);
    padding: 0.2em 0.5em;
    border-radius: 6px;
    font-size: 2.2vh;
  }

  /* ---------- Screen picker (assign this TV to a screen, once, with the remote) ---------- */
  #picker {
    position: fixed;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.94);
    color: #fff;
    z-index: 50;
    cursor: default;
    padding: 6vh 4vw;
  }
  #picker.on { display: flex; }
  #picker h2 { font-size: 4.4vh; margin-bottom: 1.2vh; }
  #picker .sub { font-size: 2.4vh; color: #aaa; margin-bottom: 4vh; text-align: center; max-width: 44ch; }
  #pickerList { width: min(70vw, 900px); }
  #picker .opt {
    display: block;
    width: 100%;
    padding: 2.4vh 3vw;
    margin: 1.4vh 0;
    font-size: 3.2vh;
    text-align: center;
    background: #1c1c1c;
    border: 4px solid transparent;
    border-radius: 16px;
    color: #fff;
  }
  #picker .opt.sel { border-color: var(--ticker-accent); background: #2c2c2c; }
  #picker .hint { margin-top: 4.5vh; font-size: 2.1vh; color: #777; text-align: center; }

  /* ---------- Remote-control overlays (pushed from the dashboard) ---------- */
  /* Blank = soft "screen off": solid black over everything. */
  #blank {
    position: fixed; inset: 0; background: #000; z-index: 45; display: none;
  }
  #blank.on { display: block; }
  /* Takeover = an instant fullscreen message pushed to this TV. */
  #takeover {
    position: fixed; inset: 0; z-index: 46; display: none;
    align-items: center; justify-content: center; text-align: center;
    background: #000; color: #fff; padding: 8vh 6vw;
  }
  #takeover.on { display: flex; }
  #takeover .msg { font-size: 7vh; font-weight: 700; line-height: 1.25; max-width: 24ch; }
</style>
</head>
<body>
  <div id="stage"></div>
  <div id="clock"></div>
  <div id="weather">
    <span class="icon" id="wxIcon"></span>
    <span class="temp" id="wxTemp"></span>
    <span class="meta"><span class="cond" id="wxCond"></span><span class="place" id="wxPlace"></span></span>
  </div>

  <div id="ticker">
    <div class="label" id="tickerLabel">NEWS</div>
    <div class="track"><span id="tickerText"></span></div>
  </div>

  <div id="message">
    <h1>Signage is ready 🎉</h1>
    <p>Add images to <code>images/</code> and list them in <code>content.json</code>,
       then refresh. This screen updates itself automatically.</p>
  </div>

  <div id="picker">
    <h2>Which screen is this TV?</h2>
    <p class="sub">Use the remote ▲ ▼ to highlight, then press OK / Select.</p>
    <div id="pickerList"></div>
    <div class="hint">Change this later: press the ☰ (menu) button on the remote.</div>
    <div class="hint" id="pickerDiag" style="margin-top:1.5vh;font-size:1.7vh;color:#555;"></div>
  </div>

  <div id="blank"></div>
  <div id="takeover"><div class="msg" id="takeoverMsg"></div></div>

<script>
/* =========================================================================
   DIY digital signage — reads content.json and runs a fullscreen playlist.
   Point a kiosk browser (e.g. Fully Kiosk on a Fire Stick) at this page.
   No build step, no dependencies, no subscription.
   ========================================================================= */

const CONFIG_URL   = "content.json";
const RELOAD_MS    = 60 * 1000;   // re-check content.json every 60s (live updates)
const DEFAULT_SECS = 8;           // seconds per image if not specified

// Bump this whenever signage.html changes, and set the same value in signage-version.json.
// A running TV compares the two and reloads itself to pull the new code — so feature
// updates reach every TV automatically instead of needing a manual relaunch.
const APP_VERSION  = "2026-07-11-preload2";
async function checkForUpdate() {
  try {
    const r = await fetch("signage-version.json?t=" + Date.now(), { cache: "no-store" });
    if (!r.ok) return;
    const v = (await r.json()).version;
    if (v && v !== APP_VERSION && sessionStorage.getItem("sg_upd") !== v) {
      sessionStorage.setItem("sg_upd", v);   // reload at most once per new version (no loops)
      location.reload();
    }
  } catch (_) { /* offline / missing file — ignore */ }
}

const stage      = document.getElementById("stage");
const tickerEl   = document.getElementById("ticker");
const tickerText = document.getElementById("tickerText");
const tickerLabel= document.getElementById("tickerLabel");
const clockEl    = document.getElementById("clock");
const weatherEl  = document.getElementById("weather");
const messageEl  = document.getElementById("message");
const pickerEl   = document.getElementById("picker");
const pickerList = document.getElementById("pickerList");
const blankEl    = document.getElementById("blank");
const takeoverEl = document.getElementById("takeover");
const takeoverMsg= document.getElementById("takeoverMsg");

/* ---------- Weather (Open-Meteo — free, no API key) ---------- */
let wxCfg = null, wxTimer = null;
function wmo(code){
  const c = Number(code);
  if (c === 0) return { icon:"☀️", label:"Clear" };
  if (c === 1) return { icon:"🌤️", label:"Mostly clear" };
  if (c === 2) return { icon:"⛅", label:"Partly cloudy" };
  if (c === 3) return { icon:"☁️", label:"Overcast" };
  if (c === 45 || c === 48) return { icon:"🌫️", label:"Fog" };
  if (c >= 51 && c <= 57) return { icon:"🌦️", label:"Drizzle" };
  if (c >= 61 && c <= 67) return { icon:"🌧️", label:"Rain" };
  if (c >= 71 && c <= 77) return { icon:"🌨️", label:"Snow" };
  if (c >= 80 && c <= 82) return { icon:"🌧️", label:"Showers" };
  if (c === 85 || c === 86) return { icon:"🌨️", label:"Snow showers" };
  if (c >= 95) return { icon:"⛈️", label:"Thunderstorm" };
  return { icon:"🌡️", label:"" };
}
async function fetchWeather(){
  if (!wxCfg) return;
  try {
    const unit = wxCfg.unit === "celsius" ? "celsius" : "fahrenheit";
    const u = `https://api.open-meteo.com/v1/forecast?latitude=${wxCfg.lat}&longitude=${wxCfg.lon}`
            + `&current=temperature_2m,weather_code&temperature_unit=${unit}&timezone=auto`;
    const r = await fetch(u, { cache: "no-store" });
    if (!r.ok) throw new Error("HTTP " + r.status);
    const d = await r.json();
    const cur = d.current || {};
    const w = wmo(cur.weather_code);
    document.getElementById("wxIcon").textContent = w.icon;
    document.getElementById("wxTemp").textContent = Math.round(cur.temperature_2m) + "°" + (unit === "celsius" ? "C" : "F");
    document.getElementById("wxCond").textContent = w.label;
    document.getElementById("wxPlace").textContent = wxCfg.place || "";
    weatherEl.classList.add("on");
  } catch (err) {
    console.warn("weather failed:", err.message);
  }
}
function setupWeather(w){
  const ok = w && w.enabled && w.lat != null && w.lon != null;
  if (!ok) { wxCfg = null; weatherEl.classList.remove("on"); return; }
  const changed = !wxCfg || wxCfg.lat !== w.lat || wxCfg.lon !== w.lon || wxCfg.unit !== w.unit || wxCfg.place !== w.place;
  wxCfg = { lat: w.lat, lon: w.lon, unit: w.unit || "fahrenheit", place: w.place || "" };
  if (changed) fetchWeather();
  if (!wxTimer) wxTimer = setInterval(fetchWeather, 15 * 60 * 1000);   // refresh every 15 min
}

let slides = [];          // DOM nodes, one per playlist item
let items  = [];          // normalized playlist data
let idx    = -1;
let timer  = null;
let lastSignature = "";   // detect content.json changes without flicker
let syncMode = true;      // clock-driven playback so identical playlists stay in step

/* ---------- Load + normalize config ---------- */
let currentConfig = null;   // last good config, re-evaluated on a timer for schedules

async function loadConfig() {
  checkForUpdate();   // pull new display code automatically when a new version ships
  try {
    // cache-bust so TVs always pull the newest content
    const res = await fetch(CONFIG_URL + "?t=" + Date.now(), { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const cfg = await res.json();
    currentConfig = cfg;
    applyConfig(cfg);
    setupWeather(cfg.weather);  // global weather widget
    heartbeat();               // check in with the up-to-date active playlist
    maybePromptScreen(cfg);    // first run on an unassigned TV: ask which screen this is
  } catch (err) {
    // First run / missing file: show the helper message but keep trying.
    if (!items.length) messageEl.classList.add("on");
    console.warn("content.json not loaded:", err.message);
  }
}

// Re-evaluate the schedule between fetches so a screen switches playlists at the
// scheduled time even if content.json hasn't changed.
function scheduleTick() { if (currentConfig) applyConfig(currentConfig); }

/* ---------- Screen picker ----------
   One white-label app opens one URL, so each TV needs to say which screen it is.
   The picker lists the screens from content.json; the choice is saved on the TV
   (localStorage) and reported in the heartbeat. Re-openable with the remote's ☰. */
let pickerOpen = false, pickerOpts = [], pickerSel = 0, screenPrompted = false;

function pickerOptions(cfg) {
  const scr = (cfg && Array.isArray(cfg.screens)) ? cfg.screens : [];
  return scr.map(s => ({ id: String(s.id), name: s.name || ("Screen " + s.id) }));
}
function renderPicker() {
  pickerList.innerHTML = "";
  pickerOpts.forEach((o, i) => {
    const b = document.createElement("div");
    b.className = "opt" + (i === pickerSel ? " sel" : "");
    b.textContent = o.name;
    b.addEventListener("click", () => choosePicker(i));
    pickerList.appendChild(b);
  });
}
// A one-line status the owner can read off the TV (press ☰): version + video cache/buffer.
function diagText() {
  const vids = items.filter(i => i.isVideo).length;
  let cached = 0, buffering = 0;
  slides.forEach((el, i) => {
    const it = items[i]; if (!it || !it.isVideo) return;
    const v = el.querySelector("video"); if (!v) return;
    if (String(v.src).startsWith("blob:") || v._blobApplied) cached++;
    if (v._buffering) buffering++;
  });
  let s = "v" + APP_VERSION + " · screen " + (SCREEN || "?") + " · sync " + (syncMode ? "on" : "off");
  if (vids) s += " · videos in memory " + cached + "/" + vids + (buffering ? " · buffering " + buffering : "");
  return s;
}
let diagTimer = null;
function openPicker() {
  pickerOpts = pickerOptions(currentConfig);
  if (!pickerOpts.length) return;                 // no screens defined yet — nothing to pick
  const cur = pickerOpts.findIndex(o => o.id === String(SCREEN));
  pickerSel = cur >= 0 ? cur : 0;
  pickerOpen = true;
  renderPicker();
  pickerEl.classList.add("on");
  const diag = document.getElementById("pickerDiag");
  if (diag) { diag.textContent = diagText(); clearInterval(diagTimer); diagTimer = setInterval(() => { diag.textContent = diagText(); }, 1500); }
}
function closePicker() { pickerOpen = false; pickerEl.classList.remove("on"); clearInterval(diagTimer); }
function choosePicker(i) {
  const o = pickerOpts[i];
  if (!o) return;
  SCREEN = o.id;
  try { localStorage.setItem("signageScreen", o.id); } catch (_) {}
  closePicker();
  lastSignature = "";                             // force a re-render for the newly chosen screen
  if (currentConfig) applyConfig(currentConfig);
  heartbeat();
}
// First run: if this TV wasn't told its screen by URL and hasn't picked one, and the
// config defines more than one screen, prompt once. (A single-screen setup needs no pick.)
function maybePromptScreen(cfg) {
  if (screenPrompted || URL_SCREEN || savedScreen()) return;
  if (cfg && Array.isArray(cfg.screens) && cfg.screens.length > 1) { screenPrompted = true; openPicker(); }
}

// Remote/keyboard control. The ☰ menu button (Fire TV) opens/closes the picker anytime;
// inside it the D-pad moves the highlight and OK/Select confirms.
document.addEventListener("keydown", (e) => {
  if (e.key === "ContextMenu" || e.keyCode === 82) {        // ☰ menu / KEYCODE_MENU
    e.preventDefault(); pickerOpen ? closePicker() : openPicker(); return;
  }
  if (!pickerOpen) return;
  if (e.key === "ArrowDown" || e.keyCode === 40) {
    e.preventDefault(); pickerSel = (pickerSel + 1) % pickerOpts.length; renderPicker();
  } else if (e.key === "ArrowUp" || e.keyCode === 38) {
    e.preventDefault(); pickerSel = (pickerSel - 1 + pickerOpts.length) % pickerOpts.length; renderPicker();
  } else if (e.key === "Enter" || e.keyCode === 13 || e.keyCode === 23) {  // OK / DPAD_CENTER
    e.preventDefault(); choosePicker(pickerSel);
  } else if (e.key === "Escape" || e.keyCode === 27) {
    e.preventDefault(); closePicker();
  }
});

// Which screen is this?
//   1. ?screen=front in the URL always wins (used by the dashboard's per-screen links).
//   2. Otherwise the on-device pick, saved on this TV (see the screen picker below).
//   3. Otherwise unassigned — the picker prompts once, and we fall back to the first screen.
// This lets one white-label APK (a single baked URL) serve every TV: each TV picks its
// screen once with the remote and remembers it.
function savedScreen(){ try { return localStorage.getItem("signageScreen") || ""; } catch { return ""; } }
const URL_SCREEN = new URLSearchParams(location.search).get("screen") || "";
let SCREEN   = URL_SCREEN || savedScreen();
const FORCE_PL = new URLSearchParams(location.search).get("playlist") || "";

// "HH:MM" -> minutes since midnight (null if malformed).
function hm(str) {
  if (!str || !/^\d{1,2}:\d{2}$/.test(str)) return null;
  const [h, m] = str.split(":").map(Number);
  return h * 60 + m;
}

// Which playlist should this screen show *right now*, honoring schedule rules?
// A rule matches when today's weekday is in rule.days and the current time is in
// [start, end). First matching rule wins; otherwise the screen's default playlist.
function activePlaylistId(cfg, screen) {
  const now = new Date();
  const day = now.getDay();                       // 0 = Sunday
  const mins = now.getHours() * 60 + now.getMinutes();
  if (Array.isArray(screen.rules)) {
    for (const r of screen.rules) {
      if (!r || !r.playlist || !cfg.playlists[r.playlist]) continue;
      const days = (Array.isArray(r.days) && r.days.length) ? r.days : [0,1,2,3,4,5,6];
      if (!days.includes(day)) continue;
      const s = hm(r.start), e = hm(r.end);
      if (s == null || e == null) return r.playlist;      // no time bounds → all day
      const inWindow = s <= e ? (mins >= s && mins < e) : (mins >= s || mins < e); // handles overnight
      if (inWindow) return r.playlist;
    }
  }
  return screen.playlist;
}

// Pick the playlist this screen should show. Supports the multi-playlist schema
// { playlists:{...}, screens:[...] } (with optional schedule rules) and falls back
// to the old flat schema.
let currentPlId = "";   // active playlist id, reported in the heartbeat
function resolvePlaylist(cfg) {
  if (cfg && cfg.playlists && typeof cfg.playlists === "object") {
    let plId = FORCE_PL;
    if (!plId && Array.isArray(cfg.screens)) {
      const scr = cfg.screens.find(s => String(s.id) === String(SCREEN)) || cfg.screens[0];
      if (scr) plId = activePlaylistId(cfg, scr);
    }
    if (!plId || !cfg.playlists[plId]) plId = Object.keys(cfg.playlists)[0];
    currentPlId = plId;
    return cfg.playlists[plId] || {};
  }
  currentPlId = "";
  return cfg || {};   // old flat schema — the whole file is the playlist
}

// Check in so the dashboard can show this screen online, and pick up any remote-control
// command the dashboard has queued for this screen. Silent if monitoring is unconfigured.
function heartbeat(ackCommand) {
  return fetch("/api/heartbeat", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ screen: SCREEN || "default", playlist: currentPlId, ackCommand: ackCommand || undefined }),
    keepalive: true,
  })
    .then(r => r.json())
    .then(d => { if (d && d.command && d.command_id) runCommand(d.command, d.command_id); })
    .catch(() => {});
}

/* ---------- Remote-control commands (pushed from the dashboard) ----------
   The TV runs each command once (tracked by command_id) and acks it so it won't repeat.
   Blank/takeover states are remembered on the device so they survive a reload. */
function lastCmd(){ try { return localStorage.getItem("signageLastCmd") || ""; } catch { return ""; } }
function setLastCmd(id){ try { localStorage.setItem("signageLastCmd", id); } catch (_) {} }

function setBlank(on){
  blankEl.classList.toggle("on", !!on);
  try { on ? localStorage.setItem("signageBlank","1") : localStorage.removeItem("signageBlank"); } catch (_) {}
}
function setTakeover(msg){
  if (msg == null){ takeoverEl.classList.remove("on"); try { localStorage.removeItem("signageTakeover"); } catch(_){} return; }
  takeoverMsg.textContent = msg;
  takeoverEl.classList.add("on");
  try { localStorage.setItem("signageTakeover", msg); } catch (_) {}
}

async function runCommand(command, id){
  if (!id || id === lastCmd()) return;         // already handled this one
  setLastCmd(id);
  // Ack first so the command is cleared server-side before any reload/storage wipe.
  await heartbeat(id);

  if (command === "restart")      { location.reload(); return; }
  if (command === "refresh")      { lastSignature = ""; setBlank(false); setTakeover(null); loadConfig(); return; }
  if (command === "blank")        { setBlank(true); return; }
  if (command === "wake")         { setBlank(false); return; }
  if (command === "endtakeover")  { setTakeover(null); return; }
  if (command.startsWith("takeover:")) { setTakeover(command.slice(9)); return; }
  if (command === "clear") {
    try { localStorage.clear(); } catch (_) {}
    location.reload();
    return;
  }
}

// Re-apply any remembered "off"/takeover state immediately on load (before content shows).
(function restoreOverlays(){
  try {
    if (localStorage.getItem("signageBlank")) blankEl.classList.add("on");
    const t = localStorage.getItem("signageTakeover");
    if (t != null) { takeoverMsg.textContent = t; takeoverEl.classList.add("on"); }
  } catch (_) {}
})();

function applyConfig(fullCfg) {
  const cfg = resolvePlaylist(fullCfg);
  const list = Array.isArray(cfg) ? cfg : (cfg.slides || cfg.items || []);
  // Sync playback across TVs unless explicitly disabled. When on, every TV shows the
  // slide the wall clock says should be on now, so identical playlists stay in step.
  const wantSync = !(fullCfg && fullCfg.sync === false);
  const signature = JSON.stringify({ screen: SCREEN, list, t: cfg.tickerText, l: cfg.tickerLabel, f: cfg.fit, y: wantSync });
  if (signature === lastSignature) return;   // nothing changed; leave playback alone
  lastSignature = signature;
  syncMode = wantSync;

  const globalFit = cfg.fit === "cover" ? "cover" : "contain";

  // Ticker
  if (cfg.tickerText) {
    const speed = Number(cfg.tickerSpeed) || 30;       // seconds per full pass
    tickerText.textContent = cfg.tickerText;
    tickerText.style.animationDuration = speed + "s";
    tickerLabel.textContent = cfg.tickerLabel || "INFO";
    tickerEl.classList.add("on");
    stage.style.bottom = "var(--ticker-h)";
  } else {
    tickerEl.classList.remove("on");
    stage.style.bottom = "0";
  }

  // Clock
  clockEl.classList.toggle("on", !!cfg.showClock);

  // Build playlist
  items = list.map(raw => {
    const it = (typeof raw === "string") ? { src: raw } : (raw || {});
    const src = it.src || it.url || it.image || it.video || "";
    const isVideo = /\.(mp4|webm|ogg|mov|m4v)(\?|$)/i.test(src) || it.type === "video";
    return {
      src,
      isVideo,
      seconds: Number(it.seconds || it.duration) || DEFAULT_SECS,
      caption: it.caption || "",
      fit: it.fit === "cover" ? "cover" : (it.fit === "contain" ? "contain" : globalFit),
    };
  }).filter(it => it.src);

  rebuildSlides();
}

/* ---------- Preload videos into memory ----------
   Streaming a video from cloud storage on a low-power TV buffers (and hurts sync, which
   seeks). So we download each clip once into a Blob and play it from memory — after which
   playback and seeking are instant with no re-buffering. If a file is too big or the store
   won't allow a cross-origin fetch, we silently keep streaming it. */
const MAX_PRELOAD_BYTES = 150 * 1024 * 1024;   // don't cache anything huge into TV memory
let videoBlobs = {};                           // src -> object URL (kept until content changes)

function swapVideoSrc(v, url) {
  if (!v || v._blobApplied === url) return;
  const t = v.currentTime || 0, wasPlaying = !v.paused && !v.ended;
  v._blobApplied = url;
  v.src = url;
  const onMeta = () => {
    v.removeEventListener("loadedmetadata", onMeta);
    try { v.currentTime = t; } catch (_) {}
    if (wasPlaying) { const p = v.play(); if (p && p.catch) p.catch(() => {}); }
  };
  v.addEventListener("loadedmetadata", onMeta);
  try { v.load(); } catch (_) {}
}
// Apply a ready blob, but don't yank the source from under the on-screen clip — defer that
// swap until it's off-screen so there's no visible flicker.
function applyBlob(v, url) {
  if (!v || !v.isConnected) return;                       // element from an old playlist — skip
  const slide = v.closest(".slide");
  if (slide && slide.classList.contains("active")) { v._pendingBlob = url; return; }
  swapVideoSrc(v, url);
}
// Download clips one at a time so they don't split the TV's Wi-Fi and end up all buffering.
let _preloadChain = Promise.resolve();
function queuePreload(src, v) { _preloadChain = _preloadChain.then(() => preloadVideo(src, v)); }
async function preloadVideo(src, v) {
  if (videoBlobs[src]) { applyBlob(v, videoBlobs[src]); return; }
  try {
    const resp = await fetch(src, { cache: "force-cache" });
    if (!resp.ok) return;                                   // 4xx/5xx — keep streaming
    const len = Number(resp.headers.get("content-length") || 0);
    if (len && len > MAX_PRELOAD_BYTES) return;             // too big to hold in memory
    const blob = await resp.blob();
    if (blob.size > MAX_PRELOAD_BYTES) return;
    const url = URL.createObjectURL(blob);
    videoBlobs[src] = url;
    applyBlob(v, url);
  } catch (_) { /* CORS / offline — streaming still works */ }
}
// When a video leaves the screen, pause it and apply any blob that finished downloading.
function idleVideo(el) {
  const v = el && el.querySelector && el.querySelector("video");
  if (!v) return;
  try { v.pause(); } catch (_) {}
  if (v._pendingBlob) { const u = v._pendingBlob; v._pendingBlob = null; swapVideoSrc(v, u); }
}

/* ---------- Build slide DOM ---------- */
function rebuildSlides() {
  clearTimeout(timer);
  // Free any cached video memory from the previous playlist.
  Object.values(videoBlobs).forEach(u => { try { URL.revokeObjectURL(u); } catch (_) {} });
  videoBlobs = {};
  stage.innerHTML = "";
  slides = [];

  if (!items.length) {
    messageEl.classList.add("on");
    return;
  }
  messageEl.classList.remove("on");

  items.forEach(it => {
    const el = document.createElement("div");
    el.className = "slide fit-" + it.fit;
    if (it.isVideo) {
      const v = document.createElement("video");
      v.src = it.src;
      v.muted = true;
      v.playsInline = true;
      // "metadata" only: grab enough to know the length + first frame, but DON'T let the
      // element stream the whole file — the in-memory preloader downloads it instead, so
      // the two don't fight over Wi-Fi.
      v.preload = "metadata";
      // Learn the clip's real length so the synced cycle is exact (same file → same
      // length on every TV). Re-align once we know it.
      v.addEventListener("loadedmetadata", () => {
        if (v.duration && isFinite(v.duration) && v.duration > 0 && it.vdur !== v.duration) {
          it.vdur = v.duration;
          if (syncMode) showSyncSlide(false);
        }
      });
      // Track buffering so the on-TV status readout can show it.
      v.addEventListener("waiting", () => { v._buffering = true; });
      v.addEventListener("stalled", () => { v._buffering = true; });
      v.addEventListener("playing", () => { v._buffering = false; });
      v.addEventListener("canplaythrough", () => { v._buffering = false; });
      el.appendChild(v);
      queuePreload(it.src, v);   // download to memory (one clip at a time); swap in when ready

    } else {
      const img = document.createElement("img");
      img.src = it.src;
      el.appendChild(img);
    }
    if (it.caption) {
      const c = document.createElement("div");
      c.className = "caption";
      c.textContent = it.caption;
      el.appendChild(c);
    }
    stage.appendChild(el);
    slides.push(el);
  });

  idx = -1;
  if (syncMode) showSyncSlide(true); else next();
}

/* ---------- Playback: independent loop (sync off) ---------- */
function next() {
  clearTimeout(timer);
  if (!slides.length) return;

  if (idx >= 0) { slides[idx].classList.remove("active"); idleVideo(slides[idx]); }
  idx = (idx + 1) % slides.length;
  const el = slides[idx];
  const it = items[idx];
  el.classList.add("active");

  if (it.isVideo) {
    const v = el.querySelector("video");
    v.currentTime = 0;
    // advance when the clip ends; fall back to a timeout if metadata is odd
    v.onended = next;
    const p = v.play();
    if (p && p.catch) p.catch(() => { timer = setTimeout(next, it.seconds * 1000); });
    // safety net in case 'ended' never fires
    timer = setTimeout(next, (v.duration ? v.duration + 1 : it.seconds + 30) * 1000);
  } else {
    timer = setTimeout(next, it.seconds * 1000);
  }
}

/* ---------- Playback: clock-synced (sync on) ----------
   Which slide is on, and how far into it, is a pure function of the wall clock and the
   playlist's slide lengths — so any two TVs on the same playlist show the same thing at
   the same time (Fire TV clocks are NTP-synced). Videos are seeked to the right offset. */
function effDur(it) {
  if (it.isVideo) return (it.vdur && isFinite(it.vdur)) ? it.vdur : (it.seconds || DEFAULT_SECS);
  return it.seconds || DEFAULT_SECS;
}
function syncState() {
  const durs = items.map(effDur);
  const cycle = durs.reduce((a, b) => a + b, 0);
  if (!(cycle > 0)) return { index: 0, into: 0, dur: durs[0] || DEFAULT_SECS };
  let t = (Date.now() / 1000) % cycle;              // seconds into the shared cycle
  for (let i = 0; i < durs.length; i++) {
    if (t < durs[i]) return { index: i, into: t, dur: durs[i] };
    t -= durs[i];
  }
  const last = durs.length - 1;
  return { index: last, into: 0, dur: durs[last] };
}
function showSyncSlide(force) {
  if (!slides.length) return;
  const s = syncState();
  if (s.index !== idx || force) {
    if (idx >= 0 && slides[idx]) {
      slides[idx].classList.remove("active");
      idleVideo(slides[idx]);   // pause the old clip and apply any downloaded blob
    }
    idx = s.index;
    const el = slides[idx], it = items[idx];
    el.classList.add("active");
    if (it.isVideo) {
      const v = el.querySelector("video");
      // advancing early (clip shorter than we thought) just re-checks the clock
      v.onended = () => { if (syncMode) showSyncSlide(true); };
      try { v.currentTime = s.into || 0; } catch (_) {}
      const p = v.play(); if (p && p.catch) p.catch(() => {});
    }
  } else {
    // Same slide as the clock wants — nudge a drifting video back into alignment.
    const it = items[idx], el = slides[idx];
    if (it && it.isVideo && el) {
      const v = el.querySelector("video");
      if (v && isFinite(s.into) && Math.abs((v.currentTime || 0) - s.into) > 1.2) {
        try { v.currentTime = s.into; } catch (_) {}
      }
    }
  }
  // Re-evaluate at this slide's boundary (recomputed from the clock, so late timers self-heal).
  clearTimeout(timer);
  const remaining = Math.max(0.25, (s.dur || effDur(items[idx])) - (s.into || 0));
  timer = setTimeout(() => { if (syncMode) showSyncSlide(true); }, remaining * 1000 + 50);
}

/* ---------- Clock ---------- */
function tickClock() {
  if (!clockEl.classList.contains("on")) return;
  const d = new Date();
  let h = d.getHours(), m = d.getMinutes();
  const ampm = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;
  clockEl.textContent = h + ":" + String(m).padStart(2, "0") + " " + ampm;
}

/* ---------- Keep the screen awake (best-effort) ---------- */
async function keepAwake() {
  try {
    if ("wakeLock" in navigator) {
      await navigator.wakeLock.request("screen");
    }
  } catch (_) { /* not supported / not permitted — kiosk app handles it */ }
}
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible") keepAwake();
});

/* ---------- Boot ---------- */
loadConfig();
setInterval(loadConfig, RELOAD_MS);
setInterval(scheduleTick, 20 * 1000);   // catch schedule boundaries between fetches
setInterval(() => { if (syncMode && slides.length) showSyncSlide(false); }, 5 * 1000); // keep TVs aligned
setInterval(tickClock, 1000);
tickClock();
keepAwake();
setInterval(heartbeat, 15 * 1000);      // check-in + poll for remote commands (first fires after config loads)
</script>
</body>
</html>
