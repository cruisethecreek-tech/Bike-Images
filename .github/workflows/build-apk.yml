name: Build Signage APK

# Builds the white-label Fire TV / Android signage app and publishes the APK as a
# downloadable artifact. Runs on demand (Actions tab -> Run workflow) or whenever the
# app source changes.

on:
  workflow_dispatch:
  push:
    paths:
      - 'signage-app/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build release APK
        working-directory: signage-app
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Stage APK
        run: |
          mkdir -p dist
          cp signage-app/app/build/outputs/apk/release/app-release.apk \
             dist/cruise-the-creek-signage.apk
          ls -lh dist

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cruise-the-creek-signage-apk
          path: dist/cruise-the-creek-signage.apk
          if-no-files-found: error
