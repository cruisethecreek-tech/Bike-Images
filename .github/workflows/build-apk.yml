name: Build Signage APK

# Builds the white-label Fire TV / Android signage app and publishes the APK as a
# downloadable artifact. Runs on demand (Actions tab -> Run workflow) or whenever the
# app source changes.

on:
  workflow_dispatch:
  push:
    paths:
      - 'signage-app/**'
      - '.github/workflows/build-apk.yml'

permissions:
  contents: write   # needed to publish the APK as a GitHub Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply branding to the app
        run: |
          # One file — branding.json — sets the app name and the URL the app opens, so a
          # new client is a config edit, not an Android-code edit.
          APP_NAME=$(jq -r '.appName // "Signage"' branding.json | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
          SIGNAGE_URL=$(jq -r '.signageUrl // "https://example.com/signage.html"' branding.json)
          cat > signage-app/app/src/main/res/values/strings.xml <<XML
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">${APP_NAME}</string>
              <string name="signage_url">${SIGNAGE_URL}</string>
          </resources>
          XML
          echo "Branded APK: '$APP_NAME' -> $SIGNAGE_URL"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build release APK
        working-directory: signage-app
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Stage APK
        run: |
          mkdir -p dist
          cp signage-app/app/build/outputs/apk/release/app-release.apk \
             dist/cruise-the-creek-signage.apk
          ls -lh dist

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cruise-the-creek-signage-apk
          path: dist/cruise-the-creek-signage.apk
          if-no-files-found: error

      # Publish the APK as a GitHub Release so it has a permanent, login-free,
      # direct download URL the Fire Stick "Downloader" app can open by link:
      #   https://github.com/<owner>/<repo>/releases/latest/download/cruise-the-creek-signage.apk
      # Each build creates a new release tagged build-<run number>; GitHub serves the
      # newest one as "latest", so the URL above always points at the freshest APK.
      - name: Publish APK release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Signage APK build ${{ github.run_number }}
          body: |
            Cruise the Creek signage app — automatic build.

            Download **cruise-the-creek-signage.apk** below, or sideload directly via the
            Fire Stick Downloader app using this permanent link (always the newest build):

            https://github.com/${{ github.repository }}/releases/latest/download/cruise-the-creek-signage.apk

            Opens `https://bike-images.vercel.app/signage.html` on launch.
          files: dist/cruise-the-creek-signage.apk
          make_latest: true
