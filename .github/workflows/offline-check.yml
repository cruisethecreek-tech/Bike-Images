name: Offline screen alerts

# Pings the /api/check-offline endpoint on a schedule so offline screens trigger an email.
# Free — runs on GitHub's schedule. Set two repo secrets to turn it on:
#   SITE_URL     your deploy, e.g. https://bike-images.vercel.app
#   CRON_SECRET  the same value you set in Vercel (protects the endpoint)
# Until SITE_URL is set, the job no-ops. You can also trigger it manually (Run workflow).

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes (GitHub may delay under load — that's fine)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping offline check
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SITE_URL" ]; then
            echo "SITE_URL secret not set — skipping (add it to enable offline alerts)."
            exit 0
          fi
          echo "Checking ${SITE_URL}/api/check-offline"
          curl -fsS "${SITE_URL%/}/api/check-offline?key=${CRON_SECRET}" || echo "check-offline ping failed (non-fatal)"
